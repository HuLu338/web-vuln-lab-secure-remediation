<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Files</title>
  </head>
  <body>
    <h1>File List</h1>

    <p><a href="/home">Back to Home</a></p>

    <p>
      Current user:
      <strong th:text="${currentUser}"></strong>
    </p>

    <p>
      Switch user:
      <a href="/files?user=alice">Alice</a> |
      <a href="/files?user=bob">Bob</a>
    </p>

    <h2>Upload File</h2>
    <form action="/files/upload" method="post" enctype="multipart/form-data">
      <input type="hidden" name="user" th:value="${currentUser}" />
      <input type="file" name="file" required />
      <button type="submit">Upload</button>
    </form>

    <hr />

    <table border="1" cellpadding="8">
      <thead>
        <tr>
          <th>ID</th>
          <th>Original Name</th>
          <th>Stored Name</th>
          <th>Content Type</th>
          <th>Size</th>
          <th>Storage Path</th>
          <th>Created At</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(files)}">
          <td colspan="8">No files found.</td>
        </tr>
        <tr th:each="file : ${files}">
          <td th:text="${file.id}"></td>
          <td th:text="${file.originalName}"></td>
          <td th:text="${file.storedName}"></td>
          <td th:text="${file.contentType}"></td>
          <td th:text="${file.size}"></td>
          <td th:text="${file.storagePath}"></td>
          <td th:text="${file.createdAt}"></td>
          <td>
            <a th:href="@{/files/download/{id}(id=${file.id})}">Download</a>

            <form
              th:action="@{/files/delete/{id}(id=${file.id})}"
              method="post"
              style="display: inline"
            >
              <input type="hidden" name="user" th:value="${currentUser}" />
              <button type="submit">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
