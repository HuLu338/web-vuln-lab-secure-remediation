<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Comments</title>
  </head>
  <body>
    <h1>Comments</h1>

    <p><a href="/home">Back to Home</a></p>

    <p>
      Current user:
      <strong th:text="${currentUser}"></strong>
    </p>

    <p>
      Switch user:
      <a href="/comments?user=alice">Alice</a> |
      <a href="/comments?user=bob">Bob</a>
    </p>

    <h2>Add Comment</h2>
    <p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red"></p>

    <form action="/comments" method="post">
      <input type="hidden" name="user" th:value="${currentUser}" />
      <textarea name="content" rows="4" cols="50" required></textarea>
      <br />
      <button type="submit">Post Comment</button>
    </form>

    <hr />

    <h2>Comment List</h2>
    <div th:if="${#lists.isEmpty(comments)}">
      <p>No comments yet.</p>
    </div>

    <div
      th:each="comment : ${comments}"
      style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px"
    >
      <p>
        <strong>User:</strong>
        <span th:text="${comment.user.username}"></span>
      </p>
      <p>
        <strong>Created At:</strong>
        <span th:text="${comment.createdAt}"></span>
      </p>
      <p>
        <strong>Content:</strong>
        <span th:text="${comment.content}"></span>
      </p>
    </div>
  </body>
</html>
